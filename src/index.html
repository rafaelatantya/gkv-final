<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Tata Tertib IPB University - PhaserJS Edition</title>
    
    <!-- Modern Typography: Google Fonts (Outfit & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Pustaka Game Engine Phaser 3 (CDN Stabil & Berkinerja Tinggi) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Design System & Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ui.css">
</head>
<body>

    <!-- Container Utama untuk Game Canvas Phaser 3 -->
    <div id="phaser-game-container"></div>

    <!-- Lapisan Overlay Antarmuka (HTML/CSS UI Overlay di atas Canvas Phaser) -->
    <div id="app-ui-layer" class="ui-layer-container">
        <!-- Seluruh modal kuis, setup pemain, dan HUD glassmorphism akan disuntikkan secara dinamis di sini -->
    </div>

    <!-- Bootstrapper Aplikasi Utama -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
